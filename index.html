<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sea Alure · Guest Guide</title>
<link rel="icon" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F4F8FB;color:#1B3A5C;min-height:100vh;max-width:480px;margin:0 auto}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.loading img{width:120px;height:120px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.loading p{color:#5BA4D9;font-size:14px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.select-screen{padding:20px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.lang-row{width:100%;display:flex;justify-content:flex-end}
.lang-btn{background:#E8F0F8;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:#1B3A5C;letter-spacing:.5px}
.lang-btn-dark{background:rgba(27,58,92,0.15);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:#1B3A5C;letter-spacing:.5px}
.logo-area{text-align:center;margin-bottom:12px}
.logo-area img{width:160px;height:160px;border-radius:50%;object-fit:cover;margin-bottom:8px}
.brand-sub{font-size:14px;color:#2E6B9E;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.select-label{font-size:15px;color:#2E6B9E;margin:8px 0}

.prop-card{width:100%;max-width:400px;display:flex;align-items:center;gap:14px;padding:12px;background:#fff;border:1px solid #D0E1F0;border-radius:14px;text-align:left}
.prop-card:active{transform:scale(.98)}
.prop-img{width:64px;height:64px;border-radius:10px;background-size:cover;background-position:center;flex-shrink:0;background-color:#E8F0F8}
.prop-info{flex:1;display:flex;flex-direction:column;gap:3px}
.prop-name{font-weight:600;font-size:16px}
.prop-addr{font-size:13px;color:#5BA4D9}
.prop-arrow{font-size:20px;color:#5BA4D9}

.header{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#89D4F5;position:sticky;top:0;z-index:10}
.back-btn{font-size:18px;padding:4px 8px;color:#1B3A5C}
.header-title{font-weight:600;font-size:16px;color:#1B3A5C}
.header-sub{font-size:12px;color:#1B3A5C}
.header-link{font-size:12px;color:#1B3A5C;text-decoration:none;display:block}

.nav{display:flex;overflow-x:auto;gap:2px;padding:8px 12px;background:#fff;border-bottom:1px solid #D0E1F0;position:sticky;top:54px;z-index:9}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border-radius:10px;min-width:60px;transition:all .15s;color:#5BA4D9}
.nav-item.active{background:#1B3A5C;color:#fff}
.nav-icon{font-size:18px}
.nav-label{font-size:11px;font-weight:500}

.content{padding:0 16px 80px}
.hero{height:200px;border-radius:16px;background-size:cover;background-position:center;display:flex;align-items:flex-end;margin:16px 0;overflow:hidden}
.hero-overlay{background:linear-gradient(transparent,rgba(0,0,0,.65));width:100%;padding:40px 20px 20px}
.hero h2{color:#fff;font-size:26px;font-weight:700}
.hero p{color:rgba(255,255,255,.85);font-size:14px;margin-top:4px}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.quick-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:18px 12px;background:#fff;border:1px solid #D0E1F0;border-radius:14px}
.quick-card:active{transform:scale(.97)}
.quick-icon{font-size:28px}
.quick-label{font-weight:600;font-size:14px}
.quick-sub{font-size:12px;color:#5BA4D9}

.section-title{font-size:22px;font-weight:700;margin:20px 0 14px;letter-spacing:-.3px}

.info-card{background:#fff;border:1px solid #D0E1F0;border-radius:14px;padding:4px 0}
.info-row{display:flex;align-items:center;gap:12px;padding:12px 16px}
.info-icon{font-size:20px;width:28px;text-align:center}
.info-content{flex:1;display:flex;flex-direction:column}
.info-label{font-size:12px;color:#5BA4D9;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.info-value{font-size:15px;font-weight:500;margin-top:2px}
.copy-btn{background:#E8F0F8;border-radius:8px;padding:6px 10px;font-size:16px}
.copy-btn:active{transform:scale(.9)}
.divider{height:1px;background:#D0E1F0;margin:0 16px}
.maps-btn{display:block;text-align:center;padding:14px;background:#1B3A5C;color:#fff;border-radius:12px;font-weight:600;font-size:15px;margin-top:14px}

.cat-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
.cat-pill{padding:8px 14px;border-radius:20px;border:1px solid #D0E1F0;background:#fff;font-size:13px;font-weight:500;color:#1B3A5C;white-space:nowrap}
.cat-pill.active{background:#1B3A5C;color:#fff;border-color:#1B3A5C}

.place-card{background:#fff;border:1px solid #D0E1F0;border-radius:14px;padding:16px;margin-bottom:10px}
.place-name{font-weight:600;font-size:16px;margin-bottom:6px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.pick-badge{display:inline-block;background:#FFF8E1;color:#B8860B;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.place-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cat-tag{font-size:12px;padding:3px 10px;border-radius:8px;font-weight:500}
.price-tag{font-size:13px;font-weight:600;color:#2E6B9E}
.place-desc{font-size:14px;color:#3D6080;margin:10px 0;line-height:1.5}
.place-actions{display:flex;gap:8px}
.place-action{padding:8px 14px;background:#E8F0F8;border-radius:8px;font-size:13px;font-weight:500;color:#1B3A5C}

.rule-item{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;background:#fff;border:1px solid #D0E1F0;border-radius:12px;margin-bottom:8px}
.rule-item.high{border-color:#F4C963;background:#FFFDF4}
.rule-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.rule-text{font-size:14px;line-height:1.5}

.faq-item{width:100%;text-align:left;background:#fff;border:1px solid #D0E1F0;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.faq-q{display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:600;font-size:15px}
.faq-chevron{font-size:12px;color:#5BA4D9;transition:transform .2s;flex-shrink:0}
.faq-a{margin-top:10px;padding-top:10px;border-top:1px solid #D0E1F0;font-size:14px;color:#3D6080;line-height:1.6;display:none}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-chevron{transform:rotate(180deg)}

.emergency-top{text-align:center;margin:0 0 20px}
.emergency-big{display:inline-flex;flex-direction:column;align-items:center;gap:4px;padding:20px 40px;background:#C62828;color:#fff;border-radius:16px;font-weight:600}
.emergency-big span:first-child{font-size:28px}
.emergency-big span:nth-child(2){font-size:18px}
.emergency-big span:last-child{font-size:13px;opacity:.9}

.contact-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border:1px solid #D0E1F0;border-radius:12px;margin-bottom:8px}
.contact-icon{font-size:24px;width:36px;text-align:center}
.contact-info{flex:1;display:flex;flex-direction:column}
.contact-name{font-weight:600;font-size:14px}
.contact-avail{font-size:12px;color:#5BA4D9}
.contact-actions{display:flex;gap:6px}
.call-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:#E8F0F8;border-radius:10px;font-size:18px}

.footer{text-align:center;padding:20px;font-size:12px;color:#5BA4D9;opacity:.5}
.empty{text-align:center;color:#5BA4D9;padding:40px 0;font-size:14px}
.hidden{display:none}
</style>
</head>
<body>

<div id="loading" class="loading">
  <img src="logo.png" alt="Sea Alure">
  <p>Loading your guide...</p>
</div>

<div id="app" class="hidden"></div>

<script>
const SHEET_ID = '1hnxFZadQ78AX8IuvRTVAs3OmpSyUXJukP-2v3gFBmHM';
const TABS = ['Properties','Places','Rules','Emergency','FAQ'];

const T = {
  el: { guestGuide:'Guest guide', selectProperty:'Επιλέξτε το κατάλυμά σας', welcome:'Καλώς ήρθατε!', welcomeSub:'Ό,τι χρειάζεστε, σε ένα μέρος', home:'Αρχική', checkin:'Check-in', explore:'Εξερεύνηση', rules:'Κανόνες', faq:'FAQ', help:'Βοήθεια', checkinInfo:'Check-in & πληροφορίες', checkout:'Check-out', doorCode:'Κωδικός πόρτας', wifiPassword:'Κωδικός WiFi', parking:'Parking', maxGuests:'Μέγιστοι επισκέπτες', openMaps:'📍 Άνοιγμα στο Google Maps', all:'Όλα', food:'Φαγητό', drinks:'Ποτό', cafe:'Καφές', beach:'Παραλία', attraction:'Αξιοθέατα', supermarket:'Super Market', weRecommend:'★ Προτείνουμε', map:'📍 Χάρτης', call:'📞 Κλήση', houseRules:'Κανόνες σπιτιού', faqTitle:'Συχνές ερωτήσεις', emergencyTitle:'Έκτακτη ανάγκη & επαφές', panEuropean:'Πανευρωπαϊκό', noPlaces:'Δεν βρέθηκαν μέρη.', places:'μέρη', houseRulesShort:'Σπιτιού' },
  en: { guestGuide:'Guest guide', selectProperty:'Select your accommodation', welcome:'Welcome!', welcomeSub:'Everything you need, in one place', home:'Home', checkin:'Check-in', explore:'Explore', rules:'Rules', faq:'FAQ', help:'Help', checkinInfo:'Check-in & info', checkout:'Check-out', doorCode:'Door code', wifiPassword:'WiFi Password', parking:'Parking', maxGuests:'Max guests', openMaps:'📍 Open in Google Maps', all:'All', food:'Food', drinks:'Drinks', cafe:'Coffee', beach:'Beach', attraction:'Attractions', supermarket:'Supermarket', weRecommend:'★ Our pick', map:'📍 Map', call:'📞 Call', houseRules:'House rules', faqTitle:'Frequently asked questions', emergencyTitle:'Emergency & contacts', panEuropean:'Pan-European', noPlaces:'No places found.', places:'places', houseRulesShort:'House' }
};

const CAT_META = {
  food:{icon:'🍽️',color:'#D85A30'}, drinks:{icon:'🍷',color:'#993556'}, cafe:{icon:'☕',color:'#BA7517'},
  beach:{icon:'🏖️',color:'#378ADD'}, attraction:{icon:'🏛️',color:'#534AB7'}, supermarket:{icon:'🛒',color:'#1D9E75'}
};
const EM_ICONS = {host:'📞',cleaning:'🧹',hospital:'🏥',pharmacy:'💊',police:'👮',taxi:'🚕',emergency:'🆘'};

let DATA = {};
let lang = 'el';
let currentProp = null;
let activeSection = 'home';
let activeCat = null;
let isLocked = false;

const COL_MAP = {
  Properties: ['property_id','name','region','address','address_en','checkin_time','checkout_time','wifi_name','wifi_pass','door_code','parking','parking_en','max_guests','maps_link','image_url'],
  Places: ['name','name_en','category','subcategory','subcategory_en','region','property_id','description','description_en','price_range','phone','maps_link','our_pick'],
  Rules: ['property_id','category','rule_text','rule_text_en','importance'],
  Emergency: ['region','type','name','name_en','phone','maps_link','available'],
  FAQ: ['property_id','category','question','question_en','answer','answer_en']
};

function csvParse(csv) {
  const rows = [];
  let row = [];
  let field = '';
  let inQ = false;
  for (let i = 0; i < csv.length; i++) {
    const ch = csv[i];
    if (ch === '"') {
      if (inQ && csv[i+1] === '"') { field += '"'; i++; continue; }
      inQ = !inQ;
      continue;
    }
    if (ch === ',' && !inQ) { row.push(field); field = ''; continue; }
    if (ch === '\n' && !inQ) { row.push(field); rows.push(row); row = []; field = ''; continue; }
    if (ch === '\r' && !inQ) continue;
    field += ch;
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function csvToObjects(csv, tab) {
  const parsed = csvParse(csv);
  if (parsed.length < 2) return [];
  const headers = COL_MAP[tab] || parsed[0];
  const result = [];
  for (let i = 1; i < parsed.length; i++) {
    const row = parsed[i];
    if (row.length < 2) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (row[idx] || '').trim());
    result.push(obj);
  }
  return result;
}

async function fetchSheet(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
  const res = await fetch(url);
  const text = await res.text();
  console.log('=== RAW CSV for ' + tab + ' (first 500 chars) ===');
  console.log(text.substring(0, 500));
  const result = csvToObjects(text, tab);
  if (result.length > 0) {
    console.log('=== First row parsed for ' + tab + ' ===');
    console.log(JSON.stringify(result[0]));
  }
  return result;
}

async function loadData() {
  try {
    const results = await Promise.all(TABS.map(t => fetchSheet(t)));
    DATA.properties = results[0];
    DATA.places = results[1];
    DATA.rules = results[2];
    DATA.emergency = results[3];
    DATA.faq = results[4];
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    render();
  } catch(e) {
    document.querySelector('.loading p').textContent = 'Error loading data. Check Sheet permissions.';
    console.error(e);
  }
}

function t(key) { return T[lang][key] || key; }
function l(obj, field) { return (lang === 'en' && obj[field+'_en']) ? obj[field+'_en'] : obj[field]; }

function getPlaces() {
  if (!currentProp) return [];
  return DATA.places.filter(p => p.region === currentProp.region && (!p.property_id || p.property_id === currentProp.property_id));
}
function getRules() {
  if (!currentProp) return [];
  return DATA.rules.filter(r => r.property_id === 'ALL' || r.property_id === currentProp.property_id);
}
function getFaq() {
  if (!currentProp) return [];
  return DATA.faq.filter(f => f.property_id === 'ALL' || f.property_id === currentProp.property_id);
}
function getEmergency() {
  if (!currentProp) return [];
  return DATA.emergency.filter(e => e.region === currentProp.region || e.region === 'ALL');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).catch(()=>{});
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = '📋', 2000);
}

function toggleLang() {
  lang = lang === 'el' ? 'en' : 'el';
  render();
}

function selectProp(id) {
  currentProp = DATA.properties.find(p => p.property_id === id);
  activeSection = 'home';
  activeCat = null;
  render();
  window.scrollTo(0,0);
}

function goBack() {
  if (isLocked) return;
  currentProp = null;
  activeSection = 'home';
  activeCat = null;
  render();
  window.scrollTo(0,0);
}

function setSection(s) {
  activeSection = s;
  activeCat = null;
  render();
  document.querySelector('.content')?.scrollIntoView({behavior:'smooth'});
}

function setCat(c) {
  activeCat = activeCat === c ? null : c;
  render();
}

function toggleFaq(el) {
  el.closest('.faq-item').classList.toggle('open');
}

function render() {
  const app = document.getElementById('app');
  if (!currentProp) {
    app.innerHTML = renderSelect();
  } else {
    app.innerHTML = renderGuide();
  }
}

function renderSelect() {
  let html = `<div class="select-screen">
    <div class="lang-row"><button class="lang-btn" onclick="toggleLang()">${lang==='el'?'EN 🇬🇧':'ΕΛ 🇬🇷'}</button></div>
    <div class="logo-area"><img src="logo.png" alt="Sea Alure"><p class="brand-sub">${t('guestGuide')}</p></div>
    <p class="select-label">${t('selectProperty')}</p>`;
  DATA.properties.forEach(p => {
    const imgStyle = p.image_url ? `background-image:url(${p.image_url})` : '';
    html += `<button class="prop-card" onclick="selectProp('${p.property_id}')">
      <div class="prop-img" style="${imgStyle}"></div>
      <div class="prop-info"><span class="prop-name">${p.name}</span><span class="prop-addr">${l(p,'address')}</span></div>
      <span class="prop-arrow">→</span></button>`;
  });
  html += '</div>';
  return html;
}

function renderGuide() {
  const places = getPlaces();
  const navItems = [
    {id:'home',label:t('home'),icon:'🏠'},{id:'checkin',label:t('checkin'),icon:'🔑'},
    {id:'places',label:t('explore'),icon:'📍'},{id:'rules',label:t('rules'),icon:'📋'},
    {id:'faq',label:t('faq'),icon:'❓'},{id:'emergency',label:t('help'),icon:'🆘'}
  ];

  let html = `<div class="header">
    ${isLocked ? '' : '<button class="back-btn" onclick="goBack()">←</button>'}
    <div style="flex:1"><div class="header-title">${currentProp.name}</div><a href="${currentProp.maps_link}" target="_blank" class="header-link"><span style="font-size:12px">📍</span> ${l(currentProp,'address')}</a></div>
    <button class="lang-btn-dark" onclick="toggleLang()">${lang==='el'?'EN 🇬🇧':'ΕΛ 🇬🇷'}</button>
  </div>`;

  html += '<div class="nav">';
  navItems.forEach(n => {
    html += `<button class="nav-item ${activeSection===n.id?'active':''}" onclick="setSection('${n.id}')">
      <span class="nav-icon">${n.icon}</span><span class="nav-label">${n.label}</span></button>`;
  });
  html += '</div><div class="content">';

  if (activeSection === 'home') html += renderHome(places);
  else if (activeSection === 'checkin') html += renderCheckin();
  else if (activeSection === 'places') html += renderPlaces(places);
  else if (activeSection === 'rules') html += renderRules();
  else if (activeSection === 'faq') html += renderFaqSection();
  else if (activeSection === 'emergency') html += renderEmergency();

  html += '</div><div class="footer">Sea Alure Luxury Resorts © 2025</div>';
  return html;
}

function renderHome(places) {
  const imgStyle = currentProp.image_url ? `background-image:url(${currentProp.image_url})` : 'background:#1B3A5C';
  return `<div class="hero" style="${imgStyle}"><div class="hero-overlay"><h2>${t('welcome')}</h2><p>${t('welcomeSub')}</p></div></div>
  <div class="quick-grid">
    <button class="quick-card" onclick="setSection('checkin')"><span class="quick-icon">🔑</span><span class="quick-label">${t('checkin')}</span><span class="quick-sub">${currentProp.checkin_time}</span></button>
    <button class="quick-card" onclick="setSection('places')"><span class="quick-icon">📍</span><span class="quick-label">${t('explore')}</span><span class="quick-sub">${places.length} ${t('places')}</span></button>
    <button class="quick-card" onclick="setSection('rules')"><span class="quick-icon">📋</span><span class="quick-label">${t('rules')}</span><span class="quick-sub">${t('houseRulesShort')}</span></button>
    <button class="quick-card" onclick="setSection('emergency')"><span class="quick-icon">🆘</span><span class="quick-label">${t('help')}</span><span class="quick-sub">24/7</span></button>
  </div>
  ${currentProp.maps_link ? `<a href="${currentProp.maps_link}" target="_blank" class="maps-btn">${t('openMaps')}</a>` : ''}`;
}

function renderCheckin() {
  const p = currentProp;
  return `<h2 class="section-title">${t('checkinInfo')}</h2>
  <div class="info-card">
    ${infoRow('🕐',t('checkin'),p.checkin_time)}
    ${infoRow('🕐',t('checkout'),p.checkout_time)}
    <div class="divider"></div>
    ${infoRow('🔑',t('doorCode'),p.door_code,true)}
    <div class="divider"></div>
    ${infoRow('📶','WiFi',p.wifi_name,true)}
    ${infoRow('🔒',t('wifiPassword'),p.wifi_pass,true)}
    <div class="divider"></div>
    ${infoRow('🅿️',t('parking'),l(p,'parking'))}
    ${infoRow('👥',t('maxGuests'),p.max_guests)}
  </div>
  ${p.maps_link ? `<a href="${p.maps_link}" target="_blank" class="maps-btn">${t('openMaps')}</a>` : ''}`;
}

function infoRow(icon, label, value, canCopy) {
  const copyHtml = canCopy ? `<button class="copy-btn" onclick="copyText('${(value||'').replace(/'/g,"\\'")}',this)">📋</button>` : '';
  return `<div class="info-row"><span class="info-icon">${icon}</span><div class="info-content"><span class="info-label">${label}</span><span class="info-value">${value||''}</span></div>${copyHtml}</div>`;
}

function renderPlaces(places) {
  const filtered = activeCat ? places.filter(p => p.category === activeCat) : places;
  const catLabels = {food:t('food'),drinks:t('drinks'),cafe:t('cafe'),beach:t('beach'),attraction:t('attraction'),supermarket:t('supermarket')};

  let html = `<h2 class="section-title">${t('explore')}</h2><div class="cat-row">`;
  html += `<button class="cat-pill ${!activeCat?'active':''}" onclick="setCat(null)">${t('all')}</button>`;
  Object.entries(CAT_META).forEach(([key,meta]) => {
    const count = places.filter(p => p.category === key).length;
    if (count === 0) return;
    const isActive = activeCat === key;
    const style = isActive ? `background:${meta.color};border-color:${meta.color};color:#fff` : '';
    html += `<button class="cat-pill ${isActive?'active':''}" style="${style}" onclick="setCat('${key}')">${meta.icon} ${catLabels[key]} (${count})</button>`;
  });
  html += '</div>';

  if (filtered.length === 0) { html += `<p class="empty">${t('noPlaces')}</p>`; return html; }

  filtered.forEach(place => {
    const meta = CAT_META[place.category] || {icon:'📍',color:'#888'};
    const isPick = place.our_pick === 'yes' || place.our_pick === 'TRUE' || place.our_pick === true;
    html += `<div class="place-card">
      <div class="place-name">${isPick ? `<span class="pick-badge">${t('weRecommend')}</span>` : ''}${l(place,'name')}</div>
      <div class="place-meta"><span class="cat-tag" style="background:${meta.color}22;color:${meta.color}">${meta.icon} ${l(place,'subcategory')}</span>
      ${place.price_range && place.price_range !== 'free' ? `<span class="price-tag">${place.price_range}</span>` : ''}</div>
      <p class="place-desc">${l(place,'description')}</p>
      <div class="place-actions">
        ${place.maps_link ? `<a href="${place.maps_link}" target="_blank" class="place-action">${t('map')}</a>` : ''}
        ${place.phone ? `<a href="tel:${place.phone}" class="place-action">${t('call')}</a>` : ''}
      </div></div>`;
  });
  return html;
}

function renderRules() {
  const rules = getRules();
  let html = `<h2 class="section-title">${t('houseRules')}</h2>`;
  rules.forEach(r => {
    const isHigh = r.importance === 'high';
    html += `<div class="rule-item ${isHigh?'high':''}"><span class="rule-icon">${isHigh?'⚠️':'ℹ️'}</span><span class="rule-text">${l(r,'rule_text')}</span></div>`;
  });
  return html;
}

function renderFaqSection() {
  const faq = getFaq();
  let html = `<h2 class="section-title">${t('faqTitle')}</h2>`;
  faq.forEach(item => {
    html += `<button class="faq-item" onclick="toggleFaq(this)">
      <div class="faq-q"><span>${l(item,'question')}</span><span class="faq-chevron">▼</span></div>
      <div class="faq-a">${l(item,'answer')}</div></button>`;
  });
  return html;
}

function renderEmergency() {
  const contacts = getEmergency();
  let html = `<h2 class="section-title">${t('emergencyTitle')}</h2>
  <div class="emergency-top"><a href="tel:112" class="emergency-big"><span>🆘</span><span>112</span><span>${t('panEuropean')}</span></a></div>`;
  contacts.filter(c => c.type !== 'emergency').forEach(c => {
    html += `<div class="contact-card">
      <span class="contact-icon">${EM_ICONS[c.type]||'📞'}</span>
      <div class="contact-info"><span class="contact-name">${l(c,'name')}</span><span class="contact-avail">${c.available}</span></div>
      <div class="contact-actions"><a href="tel:${c.phone}" class="call-btn">📞</a>
      ${c.maps_link ? `<a href="${c.maps_link}" target="_blank" class="call-btn">📍</a>` : ''}</div></div>`;
  });
  return html;
}

// Handle direct property links: ?p=tinos-aegean-view
const urlParams = new URLSearchParams(window.location.search);
const directProp = urlParams.get('p');

loadData().then(() => {
  if (directProp) {
    const found = DATA.properties.find(p => p.property_id === directProp);
    if (found) { currentProp = found; isLocked = true; render(); }
  }
});
</script>
</body>
</html>
