.hidden{display:none}

</style>

function csvToObjects(csv,tab){const parsed=csvParse(csv);if(parsed.length<2)return[];const headers=COL_MAP[tab]||parsed[0];const result=[];for(let i=1;i<parsed.length;i++){const r=parsed[i];if(r.length<2)continue;const obj={};headers.forEach((h,idx)=>obj[h]=(r[idx]||'').trim());result.push(obj)}return result}
async function fetchSheet(tab){const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;const res=await fetch(url);const text=await res.text();return csvToObjects(text,tab)}
async function loadData(){try{const results=await Promise.all(TABS.map(t=>fetchSheet(t)));DATA.properties=results[0];DATA.houseInstructions=results[1];DATA.places=results[2];DATA.rules=results[3];DATA.emergency=results[4];DATA.faq=results[5];return true}catch(e){document.querySelector('.loading p').textContent='Error loading data.';console.error(e);return false}}
function t(key){return T[lang][key]||key}
function l(obj,field){return(lang==='en'&&obj[field+'_en'])?obj[field+'_en']:obj[field]}
function getPlaces(){if(!currentProp)return[];return DATA.places.filter(p=>p.region===currentProp.region&&(!p.property_id||p.property_id===currentProp.property_id))}
function getRules(){if(!currentProp)return[];return DATA.rules.filter(r=>r.property_id==='ALL'||r.property_id===currentProp.property_id)}
function getFaq(){if(!currentProp)return[];return DATA.faq.filter(f=>f.property_id==='ALL'||f.property_id===currentProp.property_id)}
function getEmergency(){if(!currentProp)return[];return DATA.emergency.filter(e=>e.region===currentProp.region||e.region==='ALL')}
function getHI(){if(!currentProp)return null;return DATA.houseInstructions.find(h=>h.property_id===currentProp.property_id)||null}
function copyText(text,btn){navigator.clipboard.writeText(text).catch(()=>{});btn.textContent='✓';setTimeout(()=>btn.textContent='📋',2000)}
function toggleLang(){lang=lang==='el'?'en':'el';render()}
function selectProp(id){currentProp=DATA.properties.find(p=>p.property_id===id);currentHI=getHI();activeSection='home';activeCat=null;render();window.scrollTo(0,0)}
function goBack(){currentProp=null;currentHI=null;activeSection='home';activeCat=null;render();window.scrollTo(0,0)}
function setSection(s){activeSection=s;activeCat=null;render();window.scrollTo({top:0,behavior:'smooth'})}
function setCat(c){activeCat=activeCat===c?null:c;activeSub=null;render()}
function setSub(s){activeSub=activeSub===s?null:s;render()}
function toggleAccordion(el){el.closest('.faq-item,.hi-item').classList.toggle('open')}
function showSplash(){if(!currentProp)return;const imgUrl=currentProp.image_url||'logo.png';const addr=l(currentProp,'address').toUpperCase();document.getElementById('splash-container').innerHTML=`<div class="splash" id="splash"><div class="splash-bg"></div><div class="splash-content"><div class="splash-logo-wrap"><img class="splash-logo-img" src="${imgUrl}" alt="" onerror="this.src='logo.png'"></div><div class="splash-divider"></div><div class="splash-name">${currentProp.name}</div><div class="splash-loc">${addr}</div><div class="splash-loader"><div class="splash-loader-bar"></div></div></div></div>`;setTimeout(()=>{const sp=document.getElementById('splash');if(sp)sp.classList.add('hide');setTimeout(()=>{document.getElementById('splash-container').innerHTML=''},900)},4000)}
function render(){const app=document.getElementById('app');app.classList.remove('hidden');document.getElementById('loading').classList.add('hidden');if(!currentProp){app.innerHTML=renderSelect()}else{app.innerHTML=renderGuide()}}
function renderSelect(){let html=`<div class="select-screen"><div class="lang-row"><button class="lang-btn" onclick="toggleLang()">${lang==='el'?'EN 🇬🇧':'ΕΛ 🇬🇷'}</button></div><div class="logo-area"><img src="logo.png" alt="Sea Alure"><p class="brand-sub">${t('guestGuide')}</p></div><p class="select-label">${t('selectProperty')}</p>`;DATA.properties.forEach(p=>{const imgStyle=p.image_url?`background-image:url(${p.image_url})`:'';html+=`<button class="prop-card" onclick="selectProp('${p.property_id}')"><div class="prop-img" style="${imgStyle}"></div><div class="prop-info"><span class="prop-name">${p.name}</span><span class="prop-addr">${l(p,'address')}</span></div><span class="prop-arrow">→</span></button>`});html+='</div>';return html}
function renderGuide(){const places=getPlaces();const navItems=[{id:'home',label:t('home'),icon:'🏠'},{id:'before',label:t('before'),icon:'🧭'},{id:'checkin',label:t('checkin'),icon:'🔑'},{id:'house',label:t('houseInstr'),icon:'🏠'},{id:'places',label:t('explore'),icon:'📍'},{id:'rules',label:t('rules'),icon:'📋'},{id:'faq',label:t('faq'),icon:'❓'},{id:'emergency',label:t('sos'),icon:'🆘'}];let html=`<div class="header">${!directProp?`<button class="back-btn" onclick="goBack()">←</button>`:''}<div style="flex:1"><div class="header-title">${currentProp.name}</div><a href="${currentProp.maps_link}" target="_blank" class="header-link">📍 ${l(currentProp,'address')}</a></div><button class="lang-btn-dark" onclick="toggleLang()">${lang==='el'?'EN 🇬🇧':'ΕΛ 🇬🇷'}</button></div>`;html+='<div class="nav">';navItems.forEach(n=>{html+=`<button class="nav-item ${activeSection===n.id?'active':''}" onclick="setSection('${n.id}')"><span class="nav-icon">${n.icon}</span><span class="nav-label">${n.label}</span></button>`});html+='</div><div class="content">';if(activeSection==='home')html+=renderHome(places);else if(activeSection==='before')html+=renderBefore();else if(activeSection==='checkin')html+=renderCheckin();else if(activeSection==='house')html+=renderHouseInstr();else if(activeSection==='places')html+=renderPlaces(places);else if(activeSection==='rules')html+=renderRules();else if(activeSection==='faq')html+=renderFaqSection();else if(activeSection==='emergency')html+=renderEmergency();html+='</div><div class="footer"><div class="footer-logo">Sea Alure</div><div class="footer-sub">Luxury Resorts</div></div>';return html}
function renderHome(places){const hiCount=currentHI?HI_FIELDS.filter(f=>currentHI[f]).length:0;const hiSub=hiCount>0?`${hiCount} ${lang==='el'?'οδηγίες':'instructions'}`:(lang==='el'?'Θέρμανση, A/C...':'Heating, A/C...');return`<div class="welcome-banner"><h2>${currentProp.name}</h2><p>${t('welcomeSub')}</p></div><div class="cards-section"><div class="cards-section-label">${t('firstSteps')}</div><div class="big-cards"><button class="big-card" onclick="setSection('before')"><div class="card-emoji">🧭</div><div class="card-title">${lang==='el'?'Πριν το Check-in':'Before Check-in'}</div><div class="card-sub">${t('arrivalGuide')}</div></button><button class="big-card" onclick="setSection('checkin')"><div class="card-emoji">🔑</div><div class="card-title">Check-in</div><div class="card-sub">${currentProp.checkin_time}</div></button></div></div><div class="cards-section"><div class="cards-section-label">${t('discover')}</div><div class="grid-cards"><button class="grid-card" onclick="setSection('house')"><div class="card-emoji">🏠</div><div class="card-title">${t('houseInstr')}</div><div class="card-sub">${hiSub}</div></button><button class="grid-card" onclick="setSection('places')"><div class="card-emoji">📍</div><div class="card-title">${t('explore')}</div><div class="card-sub">${places.length} ${t('places')}</div></button><button class="grid-card" onclick="setSection('rules')"><div class="card-emoji">📋</div><div class="card-title">${t('rules')}</div><div class="card-sub">${lang==='el'?'Σπιτιού':'House'}</div></button><button class="grid-card" onclick="setSection('emergency')"><div class="card-emoji">🆘</div><div class="card-title">${t('sos')}</div><div class="card-sub">24/7</div></button></div></div><div class="map-section"><div class="map-label">${t('location')}</div><div class="map-container"><iframe class="map-placeholder" src="https://maps.google.com/maps?q=${encodeURIComponent(l(currentProp,'address'))}&output=embed" allowfullscreen loading="lazy"></iframe><div class="map-bottom"><div class="map-address">📍 ${l(currentProp,'address')}</div><a class="map-open-btn" href="${currentProp.maps_link}" target="_blank">${t('openMaps')}</a></div></div></div>`}
function renderBefore(){const p=currentProp;const dirs=l(p,'check_in_directions');const findUsLabel=lang==='el'?'Πώς θα μας βρείτε':'How to find us';return`<h2 class="section-title">${t('beforeTitle')}</h2>${dirs?`<div class="before-card"><div class="before-label">📍 ${findUsLabel}</div><div style="position:relative">${dirs.replace(/\n/g,'<br>')}</div></div>`:''}<div class="info-card">${infoRow('📍',t('addr'),l(p,'address'))}<div class="divider"></div>${infoRow('🔐',t('doorCode'),p.door_code,true)}<div class="divider"></div>${infoRow('🅿️',t('parking'),l(p,'parking'))}</div>${p.maps_link?`<a href="${p.maps_link}" target="_blank" class="maps-btn">📍 ${t('openMaps')}</a>`:''}`}
function renderCheckin(){const p=currentProp;return`<h2 class="section-title">${t('checkinInfo')}</h2><div class="info-card">${infoRow('🕐',t('checkin'),p.checkin_time)}${infoRow('🕐',t('checkout'),p.checkout_time)}<div class="divider"></div>${infoRow('🔐',t('doorCode'),p.door_code,true)}<div class="divider"></div>${infoRow('📶','WiFi',p.wifi_name,true)}${infoRow('🔒',t('wifiPassword'),p.wifi_pass,true)}<div class="divider"></div>${infoRow('🅿️',t('parking'),l(p,'parking'))}</div>${p.maps_link?`<a href="${p.maps_link}" target="_blank" class="maps-btn">📍 ${t('openMaps')}</a>`:''}`}
function infoRow(icon,label,value,canCopy){const copyHtml=canCopy?`<button class="copy-btn" onclick="copyText('${(value||'').replace(/'/g,"\\'")}',this)">📋</button>`:'';return`<div class="info-row"><span class="info-icon">${icon}</span><div class="info-content"><span class="info-label">${label}</span><span class="info-value">${value||''}</span></div>${copyHtml}</div>`}
function renderHouseInstr(){let html=`<h2 class="section-title">${t('houseInstrTitle')}</h2>`;const parkingVal=l(currentProp,'parking');if(parkingVal){html+=`<div class="hi-item"><div class="hi-header" onclick="toggleAccordion(this)"><span class="hi-icon">🅿️</span><span class="hi-title">${t('hi_parking')}</span><span class="hi-chevron">▼</span></div><div class="hi-body">${parkingVal.replace(/\n/g,'<br>')}</div></div>`}if(!currentHI&&!parkingVal)return html+`<p class="empty">${lang==='el'?'Δεν υπάρχουν οδηγίες.':'No instructions available.'}</p>`;if(currentHI){HI_FIELDS.forEach(f=>{const val=l(currentHI,f);if(!val)return;const icon=HI_ICONS[f]||'📌';const label=t('hi_'+f);html+=`<div class="hi-item"><div class="hi-header" onclick="toggleAccordion(this)"><span class="hi-icon">${icon}</span><span class="hi-title">${label}</span><span class="hi-chevron">▼</span></div><div class="hi-body">${val.replace(/\n/g,'<br>')}</div></div>`})}return html}
function renderPlaces(places){let filtered=activeCat?places.filter(p=>p.category===activeCat):places;if(activeSub)filtered=filtered.filter(p=>l(p,'subcategory')===activeSub);const catLabels={food:t('food'),drinks:t('drinks'),cafe:t('cafe'),beach:t('beach'),attraction:t('attraction'),supermarket:t('supermarket')};let html=`<h2 class="section-title">${t('explore')}</h2><div class="cat-row">`;html+=`<button class="cat-pill ${!activeCat?'active':''}" onclick="setCat(null)">${t('all')}</button>`;Object.entries(CAT_META).forEach(([key,meta])=>{const count=places.filter(p=>p.category===key).length;if(count===0)return;const isActive=activeCat===key;const style=isActive?`background:${meta.color};border-color:${meta.color};color:#fff`:'';html+=`<button class="cat-pill ${isActive?'active':''}" style="${style}" onclick="setCat('${key}')">${meta.icon} ${catLabels[key]} (${count})</button>`});html+='</div>';if(activeCat){const catPlaces=places.filter(p=>p.category===activeCat);const subs=[...new Set(catPlaces.map(p=>l(p,'subcategory')).filter(s=>s))];if(subs.length>1){const allLabel=lang==='el'?'Όλα':'All';html+=`<div class="sub-divider"></div><div class="sub-row">`;html+=`<button class="sub-pill ${!activeSub?'active':''}" onclick="setSub(null)">${allLabel}</button>`;subs.forEach(s=>{html+=`<button class="sub-pill ${activeSub===s?'active':''}" onclick="setSub('${s.replace(/'/g,"\\'")}')">${s}</button>`});html+='</div>'}}if(filtered.length===0)return html+`<p class="empty">${t('noPlaces')}</p>`;filtered.forEach(place=>{const meta=CAT_META[place.category]||{icon:'📍',color:'#888'};const isPick=place.our_pick==='yes'||place.our_pick==='TRUE';html+=`<div class="place-card"><div style="display:flex;gap:12px"><div style="flex:1"><div class="place-name">${isPick?`<span class="pick-badge">${t('weRecommend')}</span>`:''}${l(place,'name')}</div><div class="place-meta"><span class="cat-tag" style="background:${meta.color}22;color:${meta.color}">${meta.icon} ${l(place,'subcategory')}</span>${place.price_range&&place.price_range!=='free'?`<span class="price-tag">${place.price_range}</span>`:''}</div><p class="place-desc">${l(place,'description')}</p></div>${place.maps_link?`<a href="${place.maps_link}" target="_blank" style="flex-shrink:0;width:80px;height:80px;border-radius:12px;overflow:hidden;display:block;border:1px solid #E4EEF5"><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(l(place,'name')+' '+place.maps_link.replace('https://maps.google.com/?q=',''))}&output=embed" style="width:120px;height:120px;border:none;margin:-20px 0 0 -20px;pointer-events:none"></iframe></a>`:''}</div><div class="place-actions">${place.maps_link?`<a href="${place.maps_link}" target="_blank" class="place-action">${t('map')}</a>`:''}${place.phone?`<a href="tel:${place.phone}" class="place-action">${t('call')}</a>`:''}</div></div>`});return html}
function renderRules(){let html=`<h2 class="section-title">${t('houseRules')}</h2>`;getRules().forEach(r=>{const isHigh=r.importance==='high';html+=`<div class="rule-item ${isHigh?'high':''}"><span class="rule-icon">${isHigh?'⚠️':'ℹ️'}</span><span class="rule-text">${l(r,'rule_text')}</span></div>`});return html}
function renderFaqSection(){let html=`<h2 class="section-title">${t('faqTitle')}</h2>`;getFaq().forEach(item=>{html+=`<button class="faq-item" onclick="toggleAccordion(this)"><div class="faq-q"><span>${l(item,'question')}</span><span class="faq-chevron">▼</span></div><div class="faq-a">${l(item,'answer')}</div></button>`});return html}
function renderEmergency(){const contacts=getEmergency();let html=`<h2 class="section-title">${t('emergencyTitle')}</h2><div class="emergency-top"><a href="tel:112" class="emergency-big"><span>🆘</span><span>112</span><span>${t('panEuropean')}</span></a></div>`;contacts.filter(c=>c.type!=='emergency').forEach(c=>{html+=`<div class="contact-card"><span class="contact-icon">${EM_ICONS[c.type]||'📞'}</span><div class="contact-info"><span class="contact-name">${l(c,'name')}</span><span class="contact-avail">${c.available}</span></div><div class="contact-actions"><a href="tel:${c.phone}" class="call-btn">📞</a>${c.maps_link?`<a href="${c.maps_link}" target="_blank" class="call-btn">📍</a>`:''}</div></div>`});return html}
const urlParams=new URLSearchParams(window.location.search);const directProp=urlParams.get('p');
loadData().then(ok=>{if(!ok)return;if(directProp){const found=DATA.properties.find(p=>p.property_id===directProp);if(found){currentProp=found;currentHI=getHI();showSplash();setTimeout(()=>render(),100);return}}render()});
</script>
</body>
</html>
